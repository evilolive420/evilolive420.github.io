<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Motorsports Tools</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --a1: #4da3ff;
    --a2: #7fd1ff;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    line-height: 1.5;
  }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); margin-top: 0; }
  ul.pages {
    list-style: none;
    margin: 24px 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  ul.pages li {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }
  ul.pages a {
    color: var(--a2);
    font-size: 1.05rem;
    font-weight: 600;
    text-decoration: none;
  }
  ul.pages a:hover { text-decoration: underline; }
  ul.pages p {
    color: var(--muted);
    margin: 6px 0 0;
    font-size: 0.9rem;
  }
  footer { color: var(--muted); font-size: 0.78rem; margin-top: 30px; text-align: center; }
</style>
</head>
<body>

<h1>Motorsports Tools</h1>
<p class="subtitle">A small collection of standalone calculators and references.</p>

<!-- Add a new <li> here each time a new page is added to the repo. -->
<ul class="pages">
  <li>
    <a href="sawtooth-graph-calculator.html">Sawtooth Graph Calculator</a>
    <p>Compare two transmissions on an RPM vs Speed sawtooth chart, with tire size, rear-end ratio, and powerband highlighting.</p>
  </li>
</ul>

<footer>Static site, no build step. Hosted via GitHub Pages.</footer>

</body>
</html>
